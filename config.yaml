# ── استراتيجية التقديم الذكية (BetterJob Pro) ─────────────────────
application_strategy:
  enabled: true
  mode: quality_first
  rationale_ar: "15 تقديم مخصص/أسبوع يُنتج ردوداً أكثر بـ3× من 50 إيميل عشوائي"

  daily_targets:
    total: 3
    priority_employers: 1
    senior_roles: 1
    overlooked_roles: 1
    standard: 1

  weekly_targets:
    total: 15
    new_applications: 15
    priority_employers: 5
    follow_ups: 8
    working_days: 5

  customization_time:
    deep:
      label_ar: "تخصيص عميق"
      minutes: 15
      job_ranks: [1, 2, 3]
      require_project_mention: true
      instruction_ar: "ابحث عن مشروع محدد للشركة واذكره — Senior / Engineer / Construction"
    medium:
      label_ar: "تخصيص متوسط"
      minutes: 8
      job_ranks: [4, 5, 6]
      instruction_ar: "عدّل المسمى والـ Hook والفقرة الأولى — Cadastral / GIS / Inspector"
    light:
      label_ar: "تخصيص سريع"
      minutes: 5
      job_ranks: [7, 8, 9, 10]
      instruction_ar: "عدّل سطراً واحداً (مدينة أو مسمى فرعي)"

  weekly_plan:
    sunday:
      label_ar: "الأحد — 3 تقديمات مخصصة"
      new_applications: 3
      follow_ups: 1
      focus: priority_employers
    monday:
      label_ar: "الاثنين — 3 تقديمات (Senior)"
      new_applications: 3
      follow_ups: 2
      focus: senior_roles
    tuesday:
      label_ar: "الثلاثاء — 3 تقديمات (إنشائي/رفع)"
      new_applications: 3
      follow_ups: 1
      focus: standard
    wednesday:
      label_ar: "الأربعاء — 3 تقديمات (وظائف مغفولة)"
      new_applications: 3
      follow_ups: 2
      focus: overlooked_roles
    thursday:
      label_ar: "الخميس — 3 تقديمات + متابعات"
      new_applications: 3
      follow_ups: 2
      focus: mixed
    friday:
      label_ar: "الجمعة — استراحة"
      new_applications: 0
      follow_ups: 0
      focus: rest
    saturday:
      label_ar: "السبت — بحث وتعديل الرسائل"
      new_applications: 0
      follow_ups: 0
      focus: research

  follow_up:
    max_stages: 3
    stages:
      - stage: 1
        days_after: 3
        channel: email
        label_ar: "متابعة بريد — يوم 3"
      - stage: 2
        days_after: 7
        channel: whatsapp
        label_ar: "واتساب — يوم 7"
      - stage: 3
        days_after: 14
        channel: email
        label_ar: "متابعة نهائية — يوم 14"

  achievement_hooks:
    senior:
      ar: "12 سنة خبرة | 1,400+ مخطط بلدي (فرسان) | 48+20 فيلا MOH | SCE من 2018"
      en: "12 yrs | 1,400+ municipal plots (Farasan) | 48+20 MOH villas | SCE since 2018"
    priority:
      ar: "إقامة قابلة للتحويل | 12 سنة | Total Station Leica/Trimble/Topcon"
      en: "Transferable iqama | 12 years | Leica/Trimble/Topcon"
    overlooked_gis:
      ar: "خبرة GIS بلدي + رفع Etmad/Balady — جاهز فوراً"
      en: "Municipal GIS + Etmad/Balady submission experience"
    overlooked_cadastral:
      ar: "7+ سنوات تقسيم أراضي وحدود وصكوك"
      en: "7+ years land subdivision, boundaries & deed surveys"
    overlooked_inspector:
      ar: "QA/QC + As-Built + Red Line — خبرة استشارات ومقاولات"
      en: "QA/QC, As-Built & Red Line — consultant & contractor sites"
    standard:
      ar: "مساحة إنشائية Setting Out + GNSS/RTK + AutoCAD"
      en: "Construction survey, Setting Out, GNSS/RTK, AutoCAD"

  tier_rules:
    priority_employers:
      match: priority_employer_list
      job_title_rank: 1
      hook: priority
    senior:
      min_fit_score: 65
      job_title_rank: 1
      hook: senior
    overlooked_gis:
      keywords: [gis, balady, etmad, municipality, بلدي, gis]
      job_title_rank: 5
      hook: overlooked_gis
    overlooked_cadastral:
      keywords: [cadastral, subdivision, consultant, استشارات, تقسيم, صك]
      job_title_rank: 4
      hook: overlooked_cadastral
    overlooked_inspector:
      keywords: [inspector, qa, qc, as-built, مفتش, مراقب]
      job_title_rank: 6
      hook: overlooked_inspector
    standard:
      job_title_rank: 2
      hook: standard
